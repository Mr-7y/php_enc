name: Build php_enc for Windows (ZTS)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2019
    strategy:
      matrix:
        php-version: ['8.3']
        arch: ['x64']

    steps:
      - uses: actions/checkout@v4

      - name: Download PHP 8.3 Source
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://github.com/php/php-src/archive/refs/heads/PHP-8.3.zip" -OutFile php-src.zip
          Expand-Archive php-src.zip -DestinationPath .
          Move-Item php-src-PHP-8.3 php-src

      - name: Install VS 2019 Build Tools
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Prepare PHP Build Environment
        shell: cmd
        run: |
          cd php-src
          buildconf --force

      - name: Copy Extension to PHP Source
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path "php-src/ext/enc"
          Copy-Item "*.c", "*.h", "config.m4", "config.w32" -Destination "php-src/ext/enc"

      - name: Configure PHP with enc
        shell: cmd
        run: |
          cd php-src
          configure ^
            --disable-all ^
            --enable-cli ^
            --enable-zts ^
            --enable-enc

      - name: Build Extension DLL
        shell: cmd
        run: |
          cd php-src
          nmake php_enc.dll

      - name: Find and package DLL
        shell: powershell
        run: |
          $dll = Get-ChildItem -Recurse -Filter "php_enc.dll" -Path "php-src" | Select-Object -First 1
          if (-not $dll) { throw "❌ DLL NOT FOUND!" }
          $zipName = "php_enc-8.3-ts-vs16-x64.zip"
          Compress-Archive -Path $dll.FullName -DestinationPath $zipName -Force
          echo "ARTIFACT_NAME=$zipName" | Out-File $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}
