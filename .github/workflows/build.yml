name: Build PHP Extension for Windows (ZTS)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        php-version: [ '8.3' ]
        arch: [ 'x64' ]
        zts: [ true ]

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP (with dev headers)
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: mbstring, zip
        ini-values: date.timezone=UTC

    - name: Install Visual Studio Build Tools
      uses: ilammy/msvc-dev-cmd@v1
      # 自动配置 vcvarsall.bat 环境

    - name: Build extension
      shell: cmd
      run: |
        cd %GITHUB_WORKSPACE%
        phpize
        configure --enable-php_enc --enable-zts
        nmake

    - name: Find and package DLL
      shell: powershell
      run: |
        $dll = Get-ChildItem -Recurse -Filter "php_php_enc.dll" -Path . | Select-Object -First 1
        if (-not $dll) { throw "DLL not found!" }
        $zipName = "php_php_enc-${{ matrix.php-version }}-ts-vs16-x64.zip"
        Compress-Archive -Path $dll.FullName -DestinationPath $zipName -Force
        echo "ARTIFACT_NAME=$zipName" | Out-File $env:GITHUB_ENV -Append

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ARTIFACT_NAME }}
        path: ${{ env.ARTIFACT_NAME }}
