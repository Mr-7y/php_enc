name: Build php_enc for PHP 8.3 (Windows)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.3']
        ts: ['ts', 'nts']
        arch: ['x64']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download PHP 8.3 Source
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://github.com/php/php-src/archive/refs/tags/php-8.3.0.zip" -OutFile php-src.zip
          Expand-Archive php-src.zip -DestinationPath .
          Move-Item php-src-php-8.3.0 php-src

      - name: Setup MSVC Dev Environment (VS2022, x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Generate configure script
        shell: cmd
        run: |
          cd php-src
          buildconf --force

      - name: Copy extension source to ext/php_enc
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path "php-src/ext/php_enc" -Force
          Copy-Item "*.c", "*.h", "config.m4", "config.w32" -Destination "php-src/ext/php_enc" -ErrorAction SilentlyContinue

      - name: Configure and Build PHP 8.3 Extension
        shell: cmd
        run: |
          cd php-src

          set ZTS_FLAG=
          if "${{ matrix.ts }}"=="ts" set ZTS_FLAG=--enable-zts

          configure ^
            --disable-all ^
            --enable-cli ^
            %ZTS_FLAG% ^
            --enable-enc

          :: Build the DLL
          nmake php_enc.dll

      - name: Package the extension DLL
        shell: powershell
        run: |
          $dll = Get-ChildItem -Recurse -Filter "php_enc.dll" -Path "php-src" | Select-Object -First 1
          if (-not $dll) {
            Write-Error "❌ php_enc.dll not found!"
            exit 1
          }
          $zipName = "php_enc-8.3-${{ matrix.ts }}-vs16-${{ matrix.arch }}.zip"
          Compress-Archive -Path $dll.FullName -DestinationPath $zipName -Force
          echo "ARTIFACT_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}
