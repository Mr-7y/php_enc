name: Build php_enc Extension for PHP 8.4

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download PHP 8.4 Source (master branch)
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://github.com/php/php-src/archive/refs/heads/master.zip" -OutFile php-src.zip
          Expand-Archive php-src.zip -DestinationPath .
          Move-Item php-src-master php-src

      - name: Setup MSVC Dev Environment (VS2022)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # 关键步骤：生成 configure 脚本
      - name: Run buildconf
        shell: cmd
        run: |
          cd php-src
          buildconf --force

      # 将你的扩展源码复制到 ext/ 目录
      - name: Copy extension source
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path "php-src/ext/php_enc" -Force
          Copy-Item "*.c", "*.h", "config.m4" -Destination "php-src/ext/php_enc" -ErrorAction SilentlyContinue

      # 核心修复：指定兼容的工具链版本 14.38
      - name: Configure PHP with php_enc
        shell: cmd
        run: |
          cd php-src
          configure ^
            --disable-all ^
            --enable-cli ^
            --enable-zts ^
            --enable-php_enc ^
            --with-tools-version=14.38

      # 编译扩展 DLL
      - name: Build the extension
        shell: cmd
        run: |
          cd php-src
          nmake php_php_enc.dll

      # 打包并上传
      - name: Package and upload artifact
        shell: powershell
        run: |
          $dll = Get-ChildItem -Recurse -Filter "php_php_enc.dll" -Path "php-src" | Select-Object -First 1
          if (-not $dll) { throw "❌ php_php_enc.dll not found!" }
          $zipName = "php_php_enc-8.4-ts-vs17-x64.zip"
          Compress-Archive -Path $dll.FullName -DestinationPath $zipName -Force
          echo "ARTIFACT_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}
