name: Build php_enc for PHP 8.4 (Windows, ZTS)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest  # ← 使用最新 runner，无排队
    steps:
      - uses: actions/checkout@v4

      - name: Download PHP 8.4 Source
        shell: powershell
        run: |
          # PHP 8.4 is in active development (branch: master)
          Invoke-WebRequest -Uri "https://github.com/php/php-src/archive/refs/heads/master.zip" -OutFile php-src.zip
          Expand-Archive php-src.zip -DestinationPath .
          Move-Item php-src-master php-src

      - name: Setup VS 2022 Build Environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          # No toolset override needed — PHP 8.4 expects VS2022

      - name: Generate configure script
        shell: cmd
        run: |
          cd php-src
          buildconf --force

      - name: Copy your extension into ext/
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path "php-src/ext/php_enc" -Force
          Copy-Item "*.c", "*.h", "config.m4" -Destination "php-src/ext/php_enc" -ErrorAction SilentlyContinue

      - name: Configure PHP 8.4 with your extension
        shell: cmd
        run: |
          cd php-src
          configure ^
            --disable-all ^
            --enable-cli ^
            --enable-zts ^
            --enable-php_enc
          # PHP 8.4 auto-detects VS2022 (v14.3x+), no extra flags needed

      - name: Build the extension DLL
        shell: cmd
        run: |
          cd php-src
          nmake php_php_enc.dll

      - name: Package the DLL
        shell: powershell
        run: |
          $dll = Get-ChildItem -Recurse -Filter "php_php_enc.dll" -Path "php-src" | Select-Object -First 1
          if (-not $dll) { throw "❌ Failed to find php_php_enc.dll!" }
          $zipName = "php_php_enc-8.4-ts-vs17-x64.zip"
          Compress-Archive -Path $dll.FullName -DestinationPath $zipName -Force
          echo "ARTIFACT_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}
