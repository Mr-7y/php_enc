name: Build PHP Extension for Windows (ZTS)

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        php-version: [ '8.3' ]
        arch: [ 'x64' ]
        zts: [ true ]  # 启用线程安全（ZTS）

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP SDK
      shell: powershell
      run: |
        Invoke-WebRequest -Uri "https://github.com/php/php-sdk-binary-tools/archive/refs/heads/master.zip" -OutFile sdk.zip
        Expand-Archive sdk.zip -DestinationPath .
        Move-Item php-sdk-binary-tools-master phpsdk

    - name: Build extension
      shell: cmd
      run: |
        cd phpsdk
        .\phpsdk-starter.bat -c vs16 -a ${{ matrix.arch }} -v ${{ matrix.php-version }} -t "%GITHUB_WORKSPACE%" -s "%GITHUB_WORKSPACE%" -b build -- ^
          phpize && configure --enable-myext --enable-zts && nmake

    - name: Find and package DLL
      shell: powershell
      run: |
        # 在 build 目录下递归查找 php_myext.dll
        $dllPath = Get-ChildItem -Path build -Recurse -Include "php_myext.dll" | Select-Object -First 1
        if (-not $dllPath) {
          Write-Error "❌ Failed to find php_myext.dll!"
          exit 1
        }
        Write-Host "✅ Found DLL at: $($dllPath.FullName)"
        
        # 生成带 ZTS 标识的文件名
        $zipName = "php_myext-${{ matrix.php-version }}-ts-vs16-x64.zip"
        Compress-Archive -Path $dllPath.FullName -DestinationPath $zipName -Force
        echo "ARTIFACT_NAME=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ARTIFACT_NAME }}
        path: ${{ env.ARTIFACT_NAME }}
