name: Build php_enc Extension

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-linux:
    name: Build for Linux (PHP 8.3+)
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: none
          tools: phpize, php-config

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool bison re2c pkg-config

      - name: Build extension
        run: |
          phpize
          ./configure --enable-enc
          make -j$(nproc)

      - name: Package
        run: |
          cp .libs/enc.so php_enc-8.3.so
          tar -czf php_enc-8.3-linux-x86_64.tar.gz php_enc-8.3.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: php_enc-8.3-linux
          path: php_enc-8.3-linux-x86_64.tar.gz

  build-windows:
    name: Build for Windows (PHP 8.3 ZTS)
    runs-on: windows-2019
    timeout-minutes: 90
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Download PHP 8.3 source
        run: |
          git clone --depth=1 --branch=PHP-8.3.0 https://github.com/php/php-src.git php-src

      - name: Copy extension files
        run: |
          mkdir php-src\ext\enc
          copy enc.c php-src\ext\enc\
          copy core.h php-src\ext\enc\
          copy php_enc.h php-src\ext\enc\
          copy enc_arginfo.h php-src\ext\enc\
          copy config.m4 php-src\ext\enc\
          copy config.w32 php-src\ext\enc\

      - name: Buildconf
        working-directory: php-src
        run: buildconf --force

      - name: Configure
        working-directory: php-src
        run: configure --disable-all --enable-cli --enable-zts --enable-enc

      - name: Build
        working-directory: php-src
        run: nmake php_enc.dll

      - name: Package DLL
        run: |
          copy php-src\php_enc.dll php_enc-8.3-ts.dll
          Compress-Archive php_enc-8.3-ts.dll php_enc-8.3-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: php_enc-8.3-windows
          path: php_enc-8.3-windows-x64.zip
